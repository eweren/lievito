<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Lievito Logo">
  <!-- Pergament-Hintergrund -->
  <rect width="100" height="100" fill="#fbf3e3" />
  <!-- Ring (Schüssel/Teig-Behälter) -->
  <circle cx="50" cy="50" r="32" fill="none" stroke="#c8523a" stroke-width="3.2" />
  <!-- Drei Lievito-Bläschen (großer Kreis unten, mittlerer oben, kleiner rechts) -->
  <circle cx="50" cy="68" r="9" fill="#c8523a" />
  <circle cx="46" cy="44" r="5.5" fill="#c8523a" />
  <circle cx="59" cy="55" r="2.6" fill="#c8523a" />
</svg>
